<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Plan</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --accent: #6c8fff;
    --accent2: #ff6b6b;
    --accent3: #52d9a0;
    --text: #e8eaf6;
    --text-dim: #8b91b5;
    --border: #2d3152;
    --radius: 12px;
    --person-color: #6c8fff;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 12px;
    max-width: 860px;
    margin: 0 auto;
    -webkit-tap-highlight-color: transparent;
  }

  button, input, select, textarea {
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── Header ── */
  .header {
    display: grid;
    grid-template-areas: "title gear" "controls controls";
    grid-template-columns: 1fr auto;
    gap: 10px;
    margin-bottom: 14px;
    align-items: start;
  }
  .header-left { grid-area: title; }
  .header-left h1 { font-size: 1.2rem; font-weight: 700; }
  .date-str { color: var(--text-dim); font-size: 0.78rem; margin-top: 2px; }
  .header-gear { grid-area: gear; }

  .controls {
    grid-area: controls;
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  }

  /* ── Person toggle ── */
  .person-toggle {
    display: flex; flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .person-btn {
    flex: 1; padding: 10px 8px;
    font-size: 0.88rem; font-weight: 600;
    cursor: pointer; border: none;
    background: transparent; color: var(--text-dim);
    transition: all 0.15s; min-height: 44px;
  }
  .person-btn.active-ayush  { background: #1e2a5e; color: #6c8fff; }
  .person-btn.active-ayushi { background: #2a1a3e; color: #c084fc; }

  /* ── Week control ── */
  .week-control {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 6px 10px;
    min-height: 44px;
  }
  .week-control label { font-size: 0.75rem; color: var(--text-dim); white-space: nowrap; }
  .week-control input {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text);
    padding: 4px 4px; width: 40px;
    font-size: 0.9rem; text-align: center;
  }
  .week-nav { display: flex; gap: 4px; }
  .week-nav button {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px;
    padding: 0 12px; cursor: pointer; font-size: 1rem;
    min-height: 44px; min-width: 44px;
  }

  /* ── Day strip ── */
  .day-strip {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 14px;
  }
  .day-pill {
    background: var(--surface);
    border: 2px solid transparent;
    border-radius: 10px;
    padding: 8px 2px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s;
    min-height: 72px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .day-pill.active { border-color: var(--person-color); background: var(--surface2); }
  .day-pill.today  { box-shadow: 0 0 0 1px var(--accent3) inset; }
  .day-pill .dp-icon { font-size: 1.2rem; }
  .day-pill .dp-name { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); margin-top: 4px; }
  .day-pill .dp-date { font-size: 0.6rem; color: var(--text-dim); margin-top: 2px; }
  .day-pill.active .dp-name { color: var(--text); }

  /* ── Tags ── */
  .tag {
    display: inline-block; font-size: 0.68rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.07em;
    padding: 3px 10px; border-radius: 20px; margin-bottom: 12px;
  }
  .tag-strength { background: #1e2a5e; color: var(--accent); }
  .tag-run      { background: #1e3d2e; color: var(--accent3); }
  .tag-recovery { background: #2a1e1e; color: var(--accent2); }

  /* ── Workout card ── */
  .workout-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .workout-title   { font-size: 1.15rem; font-weight: 700; margin-bottom: 4px; }
  .workout-subtitle{ color: var(--text-dim); font-size: 0.82rem; margin-bottom: 14px; line-height: 1.4; }

  /* ── Person callout ── */
  .person-callout {
    border-radius: 10px; padding: 12px 14px;
    font-size: 0.82rem; line-height: 1.6;
    margin-bottom: 14px; border-left: 3px solid;
  }
  .callout-ayush  { background: #131b3a; border-color: #6c8fff; }
  .callout-ayushi { background: #1e1330; border-color: #c084fc; }
  .callout-title  { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .callout-ayush  .callout-title { color: #6c8fff; }
  .callout-ayushi .callout-title { color: #c084fc; }

  /* ── Exercise table — card layout on mobile ── */
  .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-bottom: 14px; }
  .exercise-table { width: 100%; border-collapse: collapse; font-size: 0.83rem; min-width: 420px; }
  .exercise-table th {
    background: var(--surface2); color: var(--text-dim);
    font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.06em;
    padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .exercise-table td { padding: 10px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .exercise-table tr:last-child td { border-bottom: none; }
  .exercise-name { font-weight: 600; }

  /* Mobile: switch exercise table to cards */
  @media (max-width: 600px) {
    .table-scroll { overflow-x: visible; }
    .exercise-table { display: block; min-width: 0; }
    .exercise-table thead { display: none; }
    .exercise-table tbody { display: block; }
    .exercise-table tr {
      display: flex; flex-wrap: wrap; gap: 10px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; margin-bottom: 8px; padding: 12px;
    }
    .exercise-table td { border: none; padding: 0; font-size: 0.82rem; }
    /* Exercise name — full row */
    .exercise-table td:first-child {
      flex: 0 0 100%; font-weight: 700; font-size: 0.9rem;
      padding-bottom: 8px; border-bottom: 1px solid var(--border);
    }
    /* All labeled cells: column layout with label on top */
    .exercise-table td[data-label] {
      flex: 1 1 auto; display: flex; flex-direction: column; gap: 4px; min-width: 0;
    }
    .exercise-table td[data-label]::before {
      content: attr(data-label);
      font-size: 0.62rem; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600;
      white-space: nowrap;
    }
    /* Log button cell — full row, no pseudo label */
    .exercise-table td.td-log { flex: 0 0 100%; padding-top: 4px; }
    .exercise-table td.td-log::before { content: none; }
  }

  .badge {
    display: inline-block; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 4px; padding: 2px 8px; font-size: 0.78rem; font-weight: 600;
    color: var(--accent); white-space: nowrap;
  }
  .badge-rest   { color: var(--accent2); }
  .badge-rpe    { color: var(--accent3); }

  /* ── Run stats ── */
  .run-stats {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px; margin-bottom: 16px;
  }
  .stat-box {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 8px; text-align: center;
  }
  .stat-label { font-size: 0.62rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-value { font-size: 1.25rem; font-weight: 700; margin-top: 4px; }
  .stat-unit  { font-size: 0.68rem; color: var(--text-dim); margin-top: 2px; line-height: 1.3; }

  /* ── Collapsible ── */
  .section { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
  .section-header {
    padding: 14px 16px; cursor: pointer;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 0.86rem; font-weight: 600; min-height: 48px;
  }
  .section-chevron { color: var(--text-dim); transition: transform 0.2s; font-size: 0.8rem; }
  .section-chevron.open { transform: rotate(180deg); }
  .section-body { padding: 0 16px 14px; font-size: 0.83rem; color: var(--text-dim); line-height: 1.7; display: none; }
  .section-body.open { display: block; }
  .bullet-list { padding-left: 16px; }
  .bullet-list li { margin-bottom: 6px; }

  /* ── Focus banner ── */
  .focus-banner {
    background: var(--surface2); border: 1px solid var(--border);
    border-left: 3px solid var(--accent3); border-radius: 0 10px 10px 0;
    padding: 10px 12px; font-size: 0.79rem; color: var(--text-dim); margin-bottom: 12px;
    line-height: 1.6;
  }
  .focus-banner strong { color: var(--text); }

  /* ── Profile card ── */
  .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  @media (max-width: 500px) { .profile-grid { grid-template-columns: 1fr; } }
  .profile-box {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px;
  }
  .profile-box.highlighted { border-color: var(--person-color); }
  .profile-box-name { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
  .profile-row { display: flex; justify-content: space-between; font-size: 0.76rem; padding: 4px 0; border-bottom: 1px solid var(--border); gap: 8px; }
  .profile-row:last-child { border-bottom: none; }
  .profile-key { color: var(--text-dim); flex-shrink: 0; }
  .profile-val { font-weight: 600; text-align: right; }

  /* ── Modal overlay ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.75); z-index: 100;
    align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    width: 100%; max-width: 600px;
    max-height: 92vh; overflow-y: auto;
    padding: 20px 16px 32px;
    position: relative;
  }
  /* drag handle visual */
  .modal::before {
    content: ''; display: block; width: 40px; height: 4px;
    background: var(--border); border-radius: 2px;
    margin: 0 auto 16px;
  }
  .modal-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 3px; }
  .modal-sub   { font-size: 0.78rem; color: var(--text-dim); margin-bottom: 18px; }
  .modal-close {
    position: absolute; top: 20px; right: 16px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-dim); border-radius: 8px;
    padding: 6px 12px; cursor: pointer; font-size: 0.9rem;
    min-height: 36px;
  }

  /* On tablet+: center the modal */
  @media (min-width: 600px) {
    .modal-overlay { align-items: center; padding: 16px; }
    .modal { border-radius: 16px; max-height: 90vh; }
    .modal::before { display: none; }
  }

  /* ── Form elements ── */
  .form-group { margin-bottom: 14px; }
  .form-label {
    font-size: 0.73rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--text-dim); margin-bottom: 6px; display: block;
  }
  .form-input, .form-textarea, .form-select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); padding: 11px 14px;
    font-size: 1rem; font-family: inherit; min-height: 44px;
  }
  .form-input:focus, .form-textarea:focus { outline: none; border-color: var(--person-color); }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-row   { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  @media (max-width: 420px) {
    .form-row, .form-row-3 { grid-template-columns: 1fr; }
  }

  /* ── Exercise log — card layout in modal ── */
  .ex-log-list { margin-bottom: 14px; }
  .ex-log-card {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px; margin-bottom: 8px;
  }
  .ex-log-name { font-weight: 600; font-size: 0.88rem; margin-bottom: 4px; }
  .ex-log-planned { font-size: 0.73rem; color: var(--text-dim); margin-bottom: 8px; }
  .ex-log-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .ex-log-field label { font-size: 0.68rem; color: var(--text-dim); display: block; margin-bottom: 3px; }
  .ex-log-input {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 8px 10px; width: 100%; font-size: 0.9rem;
    font-family: inherit; min-height: 40px;
  }
  .ex-log-input:focus { outline: none; border-color: var(--person-color); }

  /* ── Buttons ── */
  .btn {
    padding: 12px 20px; border-radius: 10px; font-size: 0.9rem;
    font-weight: 600; cursor: pointer; border: none; transition: opacity 0.15s;
    min-height: 48px;
  }
  .btn:active { opacity: 0.75; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--person-color); color: #fff; }
  .btn-ghost   { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-sm      { padding: 10px 16px; font-size: 0.84rem; min-height: 44px; }

  /* ── Log button on workout card ── */
  .log-btn-row {
    display: flex; gap: 10px; align-items: center;
    margin-top: 14px; border-top: 1px solid var(--border); padding-top: 14px;
    flex-wrap: wrap;
  }
  .log-btn-row .btn-sm { flex: 1; text-align: center; }
  .log-status  { font-size: 0.78rem; color: var(--text-dim); width: 100%; text-align: center; }
  .log-status.done { color: var(--accent3); }

  /* ── History list ── */
  .history-entry {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px; margin-bottom: 8px;
  }
  .history-date  { font-size: 0.72rem; color: var(--text-dim); margin-bottom: 4px; }
  .history-title { font-size: 0.88rem; font-weight: 600; margin-bottom: 6px; }
  .history-body  { font-size: 0.78rem; color: var(--text-dim); line-height: 1.65; white-space: pre-wrap; }
  .history-link  { font-size: 0.76rem; color: var(--accent); text-decoration: none; display: inline-block; margin-top: 8px; }

  /* ── Settings/gear icon ── */
  .gear-btn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 0 12px; cursor: pointer;
    color: var(--text-dim); font-size: 1.1rem;
    min-height: 44px; min-width: 44px;
  }

  /* ── PAT warning ── */
  .pat-warning {
    background: #2a1e0e; border: 1px solid #5a3e1a; border-radius: 8px;
    padding: 10px 12px; font-size: 0.78rem; color: #ffd166; margin-bottom: 14px; line-height: 1.5;
  }

  /* ── Exercise log button in table/card ── */
  .ex-log-btn {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text-dim); border-radius: 7px;
    padding: 6px 12px; font-size: 0.78rem; cursor: pointer;
    white-space: nowrap; min-height: 36px;
  }
  .ex-log-btn:active { background: var(--surface2); color: var(--text); }
  /* On mobile card layout the button cell becomes full-width */
  @media (max-width: 600px) {
    .exercise-table td.td-log { padding-top: 8px; }
    .ex-log-btn { width: 100%; }
  }

  /* ── Per-exercise log modal ── */
  .ex-modal-planned {
    font-size: 0.78rem; color: var(--text-dim);
    background: var(--surface2); border-radius: 8px;
    padding: 8px 12px; margin-bottom: 14px; line-height: 1.5;
  }
  .last-log-box {
    background: #131b3a; border: 1px solid var(--border);
    border-radius: 10px; padding: 12px; margin-bottom: 16px;
    font-size: 0.8rem;
  }
  .last-log-title { font-size: 0.7rem; color: var(--accent); font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .last-log-sets  { display: flex; flex-wrap: wrap; gap: 6px; }
  .last-log-set   {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 10px; font-size: 0.78rem; font-weight: 600;
  }

  /* ── Bulk log exercise sections ── */
  .bulk-ex-section {
    border: 1px solid var(--border); border-radius: 10px;
    padding: 12px; margin-bottom: 14px;
  }
  .bulk-ex-header {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 6px; gap: 8px;
  }
  .bulk-ex-name { font-weight: 700; font-size: 0.88rem; }
  .bulk-ex-planned { font-size: 0.73rem; color: var(--text-dim); white-space: nowrap; }
  .bulk-ex-last { font-size: 0.72rem; color: var(--text-dim); margin-bottom: 8px; min-height: 16px; }

  /* ── Set rows ── */
  .sets-list { margin-bottom: 12px; }
  .set-row {
    display: grid; grid-template-columns: 28px 1fr 1fr 36px;
    gap: 8px; align-items: center; margin-bottom: 8px;
  }
  .set-num {
    font-size: 0.72rem; font-weight: 700; color: var(--text-dim);
    text-align: center;
  }
  .set-input {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); padding: 10px 10px;
    font-size: 1rem; font-family: inherit; min-height: 44px;
    text-align: center; width: 100%;
  }
  .set-input:focus { outline: none; border-color: var(--person-color); }
  .set-input::placeholder { color: var(--text-dim); font-size: 0.8rem; }
  .set-remove {
    background: none; border: 1px solid var(--border);
    border-radius: 8px; color: var(--accent2); cursor: pointer;
    font-size: 1rem; min-height: 44px; min-width: 36px;
  }
  .set-remove:active { background: var(--surface2); }
  .set-col-labels {
    display: grid; grid-template-columns: 28px 1fr 1fr 36px;
    gap: 8px; margin-bottom: 4px;
  }
  .set-col-label { font-size: 0.67rem; color: var(--text-dim); text-transform: uppercase;
    letter-spacing: 0.05em; text-align: center; }

  .add-set-btn {
    width: 100%; background: var(--surface2); border: 1px dashed var(--border);
    color: var(--text-dim); border-radius: 10px; padding: 10px;
    font-size: 0.85rem; cursor: pointer; min-height: 44px; margin-bottom: 14px;
  }
  .add-set-btn:active { border-color: var(--person-color); color: var(--text); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>🏃 Workout Plan</h1>
    <div class="date-str" id="dateStr"></div>
  </div>
  <div class="header-gear">
    <button class="gear-btn" onclick="openSettings()" title="Settings">⚙️</button>
  </div>
  <div class="controls">
    <div class="person-toggle">
      <button class="person-btn active-ayush" id="btnAyush"  onclick="setPerson('ayush')">Ayush</button>
      <button class="person-btn"              id="btnAyushi" onclick="setPerson('ayushi')">Ayushi</button>
    </div>
    <div class="week-control">
      <label>Wk</label>
      <input type="number" id="weekInput" min="1" max="16" value="1" oninput="setWeek(this.value)">
      <span style="font-size:0.72rem;color:var(--text-dim)">/ 16</span>
    </div>
    <div class="week-nav">
      <button onclick="changeWeek(-1)">◀</button>
      <button onclick="changeWeek(1)">▶</button>
    </div>
  </div>
</div>

<div class="day-strip" id="dayStrip"></div>
<div id="workoutContent"></div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-title">⚙️ Settings</div>
    <div class="modal-sub">GitHub integration for workout logging</div>
    <button class="modal-close" onclick="closeSettings()">✕</button>
    <div class="pat-warning">
      ⚠️ Your PAT is stored in browser localStorage only. Use a token scoped to <strong>this repo only</strong> with <strong>Issues: Read & Write</strong> permission.
    </div>
    <div class="form-group">
      <label class="form-label">GitHub Repo (owner/name)</label>
      <input class="form-input" id="settingsRepo" placeholder="ayushggoyal/workout-plan">
    </div>
    <div class="form-group">
      <label class="form-label">Personal Access Token</label>
      <input class="form-input" id="settingsPat" type="password" placeholder="github_pat_...">
    </div>
    <div style="display:flex;gap:10px;margin-top:4px">
      <button class="btn btn-primary" onclick="saveSettings()">Save</button>
      <button class="btn btn-ghost"   onclick="testPat()">Test connection</button>
    </div>
    <div id="settingsMsg" style="font-size:0.8rem;margin-top:10px;color:var(--text-dim)"></div>
  </div>
</div>

<!-- Log Workout Modal -->
<div class="modal-overlay" id="logModal">
  <div class="modal">

// Plan starts Monday 29 June 2026
const PLAN_START = new Date('2026-06-29T00:00:00');

let currentPerson = localStorage.getItem('workout_person') || 'ayush';
let currentWeek   = null; // computed from date
let selectedDay   = null; // 0=Mon … 6=Sun

function todayDayIdx() {
  const js = new Date().getDay(); // 0=Sun
  return js === 0 ? 6 : js - 1;
}

// Returns { week: 1-16, dayIdx: 0-6 } for a given Date, or null if before plan start
function planPositionFor(date) {
  const msPerDay  = 86400000;
  const startNoon = new Date(PLAN_START); startNoon.setHours(0,0,0,0);
  const d = new Date(date); d.setHours(0,0,0,0);
  const diff = Math.floor((d - startNoon) / msPerDay);
  if (diff < 0) return null; // before plan
  const weekIdx = Math.min(Math.floor(diff / 7), 15); // clamp to week 16
  const dayIdx  = diff % 7; // 0=Mon … 6=Sun
  return { week: weekIdx + 1, dayIdx };
}

// Returns the Monday Date of a given plan week (1-indexed)
function weekStartDate(w) {
  const d = new Date(PLAN_START);
  d.setDate(d.getDate() + (w - 1) * 7);
  return d;
}

// Date string for day pill: "29 Jun"
function dayPillDate(weekNum, dayIdx) {
  const d = new Date(weekStartDate(weekNum));
  d.setDate(d.getDate() + dayIdx);
  return d.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
}

function init() {
  const pos = planPositionFor(new Date());
  if (pos) {
    currentWeek = pos.week;
    selectedDay = pos.dayIdx;
  } else {
    currentWeek = 1;
    selectedDay = 0; // Mon — plan hasn't started yet
  }
  document.getElementById('weekInput').value = currentWeek;
  applyPersonColor();
  updateDateStr();
  renderDayStrip();
  renderWorkout();
}

function updateDateStr() {
  document.getElementById('dateStr').textContent =
    new Date().toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}

function setPerson(p) {
  currentPerson = p;
  localStorage.setItem('workout_person', p);
  applyPersonColor();
  document.getElementById('btnAyush') .className = 'person-btn' + (p === 'ayush'  ? ' active-ayush'  : '');
  document.getElementById('btnAyushi').className = 'person-btn' + (p === 'ayushi' ? ' active-ayushi' : '');
  renderDayStrip();
  renderWorkout();
}

function applyPersonColor() {
  document.documentElement.style.setProperty('--person-color', PROFILES[currentPerson].color);
}

function setWeek(v) {
  currentWeek = Math.max(1, Math.min(16, parseInt(v) || 1));
  document.getElementById('weekInput').value = currentWeek;
  renderDayStrip();
  renderWorkout();
}
function changeWeek(d) { setWeek(currentWeek + d); }

// ─── DAY STRIP ───────────────────────────────────────────────────────────────
function renderDayStrip() {
  const todayPos = planPositionFor(new Date());
  const wk = WEEKS[currentWeek - 1];
  const p  = currentPerson;
  const strip = document.getElementById('dayStrip');
  strip.innerHTML = DAYS_LIST.map((day, i) => {
    const info = WEEK_PLAN[day];
    let sublabel = info.label;
    if (day === 'Wed' && wk) sublabel = `Easy ${wk[p].easy}`;
    if (day === 'Sat' && wk) sublabel = `Long ${wk[p].long.replace(' (RACE 🏁)','')}`;

    const dateStr = dayPillDate(currentWeek, i);
    const isToday = todayPos && todayPos.week === currentWeek && todayPos.dayIdx === i;

    let cls = 'day-pill';
    if (i === selectedDay) cls += ' active';
    if (isToday)           cls += ' today';

    return `<div class="${cls}" onclick="selectDay(${i})">
      <div class="dp-icon">${info.icon}</div>
      <div class="dp-name">${day}</div>
      <div class="dp-date">${dateStr}</div>
    </div>`;
  }).join('');
}

function selectDay(i) { selectedDay = i; renderDayStrip(); renderWorkout(); }

// ─── WORKOUT RENDER ──────────────────────────────────────────────────────────
function renderWorkout() {
  const day     = DAYS_LIST[selectedDay];
  const info    = WEEK_PLAN[day];
  const wk      = WEEKS[currentWeek - 1];
  const session = SESSIONS[info.session];
  const profile = PROFILES[currentPerson];
  document.getElementById('workoutContent').innerHTML = buildHTML(day, info, session, wk, profile);
}

function buildHTML(day, info, session, wk, profile) {
  let h = '';

  // Focus banner
  const focusCol = { Deload:'var(--accent2)', Recovery:'var(--accent2)', 'Race Week':'#ffd166', 'Post-Race':'#ffd166' }[wk.focus] || 'var(--accent3)';
  const pData = wk[currentPerson];
  const wkStart = weekStartDate(currentWeek);
  const wkEnd   = new Date(wkStart); wkEnd.setDate(wkEnd.getDate() + 6);
  const fmt = d => d.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
  h += `<div class="focus-banner">
    Week ${wk.w} of 16 — <strong style="color:${focusCol}">${wk.focus}</strong>
    &nbsp;·&nbsp; <span style="color:var(--text-dim)">${fmt(wkStart)} – ${fmt(wkEnd)}</span>
    &nbsp;·&nbsp; Wed easy: <strong>${pData.easy}</strong>
    &nbsp;·&nbsp; Sat long: <strong>${pData.long}</strong>
  </div>`;

  h += `<div class="workout-card">`;

  const tagLabel = { strength:'Strength', run:'Running', recovery:'Recovery' }[session.tag];
  h += `<div class="tag tag-${session.tag}">${tagLabel}</div>`;
  h += `<div class="workout-title">${info.icon} ${session.title}</div>`;
  h += `<div class="workout-subtitle">${session.subtitle}</div>`;

  // ── Person callout ──
  const personNote = profile[session.personKey];
  const personExtra = session.personExtra?.[currentPerson] || [];
  const allNotes = [personNote, ...personExtra].filter(Boolean);

  if (allNotes.length) {
    h += `<div class="person-callout callout-${currentPerson}">
      <div class="callout-title">📍 ${profile.name}'s Notes</div>
      <ul class="bullet-list">${allNotes.map(n=>`<li>${n}</li>`).join('')}</ul>
    </div>`;
  }

  // ── RUN ──
  if (session.tag === 'run') {
    const dist = day === 'Wed' ? pData.easy : pData.long;
    const isRace = dist.includes('RACE');

    h += `<div class="run-stats">
      <div class="stat-box">
        <div class="stat-label">Distance</div>
        <div class="stat-value" style="color:var(--accent3)">${dist.replace(' (RACE 🏁)','')}</div>
        ${isRace ? '<div class="stat-unit" style="color:#ffd166">🏁 RACE DAY</div>' : ''}
      </div>
      <div class="stat-box">
        <div class="stat-label">Effort</div>
        <div class="stat-value" style="font-size:1rem;color:var(--accent3);margin-top:6px">${session.effort}</div>

        <div class="stat-label">Cadence Target</div>
        <div class="stat-value" style="font-size:0.95rem;color:var(--accent);margin-top:6px">${profile.cadenceTarget.split(' ')[0]}</div>

      </div>
    </div>`;

    h += collapsible('🚶 Warm-up', session.warmup, true);
    h += collapsible('🎯 Running Cues', session.cues);
    h += collapsible('🧊 Cool-down', session.cooldown);

  }

  // ── STRENGTH ──
  else if (session.tag === 'strength') {
    // Ayushi modifier note
    if (currentPerson === 'ayushi') {
      h += `<div style="font-size:0.78rem;color:#c084fc;background:#1e1330;border-radius:8px;padding:8px 12px;margin-bottom:12px">
        ℹ️ Same exercises as Ayush — adjust weight so 2–3 reps remain in reserve on every set.
      </div>`;
    }

    h += collapsible('🔥 Warm-up', session.warmup, true);

    h += `<div class="table-scroll"><table class="exercise-table"><thead><tr>
      <th>Exercise</th><th>Sets × Reps</th><th>RPE</th><th>Rest</th><th>Tempo</th><th></th>
    </tr></thead><tbody>`;
    session.exercises.forEach((ex, i) => {
      h += `<tr>
        <td><span class="exercise-name">${ex.name}</span></td>
        <td data-label="Sets × Reps"><span class="badge">${ex.sets}</span></td>
        <td data-label="RPE"  ><span class="badge badge-rpe">${ex.rpe}</span></td>
        <td data-label="Rest" ><span class="badge badge-rest">${ex.rest}</span></td>
        <td data-label="Tempo" style="color:var(--text-dim);font-size:0.79rem">${ex.tempo}</td>
        <td class="td-log"><button class="ex-log-btn" onclick="openExLog('${day}',${i})">📝 Log</button></td>
      </tr>`;
    });
    h += `</tbody></table></div>`;

    if (session.core) {
      h += `<h3 style="font-size:0.85rem;color:var(--text-dim);margin-bottom:8px">Core Finisher</h3>`;
      if (currentPerson === 'ayushi') {
        h += `<div style="font-size:0.76rem;color:#c084fc;margin-bottom:8px">Begin with 1 round. Build to full volume over weeks.</div>`;
      }
      h += `<div class="table-scroll"><table class="exercise-table"><thead><tr>
        <th>Exercise</th><th>Sets</th><th>Rest</th><th>Purpose</th><th></th>
      </tr></thead><tbody>`;
      session.core.forEach((ex, ci) => {
        const coreIdx = session.exercises.length + ci;
        h += `<tr>
          <td><span class="exercise-name">${ex.name}</span></td>
          <td data-label="Sets"><span class="badge">${ex.sets}</span></td>
          <td data-label="Rest"><span class="badge badge-rest">${ex.rest}</span></td>
          <td data-label="Purpose" style="color:var(--text-dim);font-size:0.79rem">${ex.note}</td>
          <td class="td-log"><button class="ex-log-btn" onclick="openExLog('${day}',${coreIdx})">📝 Log</button></td>
        </tr>`;
      });
      h += `</tbody></table></div>`;
    }

    h += collapsible('🧊 Post-workout Stretch', session.stretch);
  }

  // ── RECOVERY ──
  else {
    h += `<ul class="bullet-list" style="font-size:0.86rem;line-height:1.9;margin-bottom:14px">`;
    session.activities.forEach(a => { h += `<li>${a}</li>`; });
    h += `</ul>`;

    // Profile snapshot on recovery day
    h += `<div class="profile-grid">
      ${buildProfileBox('ayush',  currentPerson === 'ayush')}
      ${buildProfileBox('ayushi', currentPerson === 'ayushi')}
    </div>`;

    h += collapsible('📱 Metrics to Log', session.metrics);
    h += collapsible('😴 Weekly Review', session.sleep);
  }

  // Log button row
  const logKey = loggedKey(day, currentWeek);
  const isLogged = localStorage.getItem(logKey);
  h += `<div class="log-btn-row">
    <button class="btn btn-primary btn-sm" onclick="openLogModal('${day}')">✏️ Log Workout</button>
    <button class="btn btn-ghost btn-sm"   onclick="openHistory('${day}')">📋 History</button>
    <span class="log-status ${isLogged ? 'done' : ''}">${isLogged ? '✓ Logged' : ''}</span>
  </div>`;

  h += `</div>`; // workout-card
  return h;
}

    ['Cadence Target', pr.cadenceTarget],
    ['Hydration', pr.hydration],

// ─── PER-EXERCISE LOG ────────────────────────────────────────────────────────
let _exLogDay  = null;
let _exLogEx   = null; // { name, sets (planned), rpe }
let _exSetId   = 0;

function exSlug(name) {
  return 'ex-' + name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g,'');
}

function getAllExercises(session) {
  return [...(session.exercises || []), ...(session.core || []).map(c => ({
    name: c.name, sets: c.sets, rpe: '—', rest: c.rest, tempo: c.note
  }))];
}

async function openExLog(day, exIdx) {
  if (!ghPat()) { openSettings(); return; }

  const session = SESSIONS[WEEK_PLAN[day].session];
  const allEx   = getAllExercises(session);
  const ex      = allEx[exIdx];
  _exLogDay = day;
  _exLogEx  = ex;
  _exSetId  = 0;

  document.getElementById('exLogTitle').textContent = ex.name;
  document.getElementById('exLogPlanned').innerHTML =
    `Planned: <strong style="color:var(--text)">${ex.sets}</strong>` +
    (ex.rpe !== '—' ? ` &nbsp;·&nbsp; RPE <strong style="color:var(--text)">${ex.rpe}</strong>` : '') +
    (ex.rest ? ` &nbsp;·&nbsp; Rest <strong style="color:var(--text)">${ex.rest}</strong>` : '');
  document.getElementById('exLogSets').innerHTML = '';
  document.getElementById('exLogNotes').value = '';
  document.getElementById('exLogMsg').textContent = '';
  document.getElementById('exLogSubmitBtn').disabled = false;
  document.getElementById('exLogSubmitBtn').textContent = 'Save to GitHub';
  document.getElementById('exLogLastBox').innerHTML =
    `<div class="last-log-box"><div class="last-log-title">⏱ Loading last log…</div></div>`;
  document.getElementById('exLogModal').classList.add('open');

  // Add default sets based on planned (parse "4 × 6–8" → 4 sets)
  const plannedSets = parseInt(ex.sets) || 3;
  for (let i = 0; i < plannedSets; i++) addExSet();

  // Fetch last log in background
  const last = await fetchLastExLog(ex.name, day);
  if (last) {
    // Pre-fill sets with last values
    const rows = document.querySelectorAll('#exLogSets .set-row');
    last.sets.forEach((s, i) => {
      if (i >= rows.length) addExSet();
      const rowId = document.querySelectorAll('#exLogSets .set-row')[i]?.dataset.setid;
      if (rowId) {
        const w = document.getElementById(`sw_${rowId}`);
        const r = document.getElementById(`sr_${rowId}`);
        if (w) w.value = s.weight;
        if (r) r.value = s.reps;
      }
    });
    document.getElementById('exLogLastBox').innerHTML = `
      <div class="last-log-box">
        <div class="last-log-title">📅 Last logged — ${last.date}</div>
        <div class="last-log-sets">${last.sets.map((s,i) =>
          `<div class="last-log-set">Set ${i+1}: ${s.weight}kg × ${s.reps}</div>`
        ).join('')}</div>
      </div>`;
  } else {
    document.getElementById('exLogLastBox').innerHTML =
      `<div style="font-size:0.75rem;color:var(--text-dim);margin-bottom:12px">No previous log found for this exercise.</div>`;
  }
}

function closeExLog() { document.getElementById('exLogModal').classList.remove('open'); }

function addExSet(weight = '', reps = '') {
  _exSetId++;
  const id   = _exSetId;
  const list = document.getElementById('exLogSets');
  const num  = list.children.length + 1;
  const div  = document.createElement('div');
  div.className = 'set-row';
  div.dataset.setid = id;
  div.innerHTML = `
    <div class="set-num">${num}</div>
    <input class="set-input" id="sw_${id}" type="number" step="0.5" min="0" placeholder="kg" value="${weight}">
    <input class="set-input" id="sr_${id}" type="number" min="0" placeholder="reps" value="${reps}">
    <button class="set-remove" onclick="removeExSet(this)">✕</button>
  `;
  list.appendChild(div);
  renumberSets();
}

function removeExSet(btn) {
  btn.closest('.set-row').remove();
  renumberSets();
}

function renumberSets() {
  document.querySelectorAll('#exLogSets .set-row').forEach((row, i) => {
    row.querySelector('.set-num').textContent = i + 1;
  });
}

async function fetchLastExLog(exName, day) {
  try {
    const labels = [
      'exercise-log', currentPerson, exSlug(exName), 'day-' + day.toLowerCase()
    ].map(encodeURIComponent).join(',');
    const res = await ghFetch(
      `/repos/${ghRepo()}/issues?labels=${labels}&state=open&per_page=1&sort=created&direction=desc`
    );
    if (!res.ok) return null;
    const issues = await res.json();
    if (!issues.length) return null;
    const issue = issues[0];
    return {
      date: new Date(issue.created_at).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' }),
      sets: parseExSets(issue.body),
    };
  } catch { return null; }
}

function parseExSets(body) {
  const sets = [];
  let inTable = false;
  for (const line of (body || '').split('\n')) {
    if (/\|\s*Set\s*\|/i.test(line)) { inTable = true; continue; }
    if (inTable && /\|[-: ]+\|/.test(line)) continue;
    if (inTable && line.trim().startsWith('|')) {
      const cols = line.split('|').map(c => c.trim()).filter(Boolean);
      if (cols.length >= 3) sets.push({ weight: cols[1].replace(/\s*kg/i,''), reps: cols[2] });
    } else if (inTable) break;
  }
  return sets;
}

async function submitExLog() {
  const btn = document.getElementById('exLogSubmitBtn');
  const msg = document.getElementById('exLogMsg');
  btn.disabled = true;
  msg.textContent = 'Saving…';
  msg.style.color = 'var(--text-dim)';

  const ex      = _exLogEx;
  const day     = _exLogDay;
  const wk      = WEEKS[currentWeek - 1];
  const profile = PROFILES[currentPerson];
  const session = SESSIONS[WEEK_PLAN[day].session];
  const dateStr = dayPillDate(currentWeek, DAYS_LIST.indexOf(day));
  const notes   = document.getElementById('exLogNotes').value.trim();

  // Collect sets
  const setRows = document.querySelectorAll('#exLogSets .set-row');
  const sets = [];
  setRows.forEach((row, i) => {
    const id = row.dataset.setid;
    const w  = document.getElementById(`sw_${id}`)?.value?.trim() || '';
    const r  = document.getElementById(`sr_${id}`)?.value?.trim() || '';
    if (w || r) sets.push({ num: i+1, weight: w || '—', reps: r || '—' });
  });

  let body = `## Exercise Log: ${ex.name}\n\n`;
  body += `| | |\n|---|---|\n`;
  body += `| **Person** | ${profile.name} |\n`;
  body += `| **Date** | ${dateStr} |\n`;
  body += `| **Week** | ${wk.w} of 16 (${wk.focus}) |\n`;
  body += `| **Session** | ${session.title} |\n`;
  body += `| **Planned** | ${ex.sets}${ex.rpe !== '—' ? ` · RPE ${ex.rpe}` : ''} |\n\n`;
  body += `## Sets\n\n| Set | Weight (kg) | Reps |\n|---|---|---|\n`;
  sets.forEach(s => { body += `| ${s.num} | ${s.weight} | ${s.reps} |\n`; });
  if (notes) body += `\n## Notes\n\n${notes}\n`;

  const title = `[${dateStr}] ${profile.name} — ${ex.name} (Week ${wk.w})`;
  const labels = ['exercise-log', currentPerson, exSlug(ex.name), 'day-' + day.toLowerCase(), `week-${wk.w}`];

  try {
    const res = await ghFetch(`/repos/${ghRepo()}/issues`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, body, labels }),
    });
    if (res.ok) {
      const data = await res.json();
      msg.style.color = 'var(--accent3)';
      msg.innerHTML = `✓ Saved! <a href="${data.html_url}" target="_blank" style="color:var(--accent)">Issue #${data.number}</a>`;
      btn.textContent = '✓ Saved';
    } else {
      const err = await res.json();
      msg.style.color = 'var(--accent2)';
      msg.textContent = `✗ ${err.message || res.statusText}`;
      btn.disabled = false;
    }
  } catch(e) {
    msg.style.color = 'var(--accent2)';
    msg.textContent = '✗ Network error';
    btn.disabled = false;
  }
}

// ─── GITHUB CONFIG ────────────────────────────────────────────────────────────
function ghRepo() { return localStorage.getItem('gh_repo') || 'ayushggoyal/workout-plan'; }
function ghPat()  { return localStorage.getItem('gh_pat')  || ''; }

function loggedKey(day, week) { return `logged_${currentPerson}_w${week}_${day}`; }

async function ghFetch(path, opts = {}) {
  const res = await fetch(`https://api.github.com${path}`, {
    ...opts,
    headers: {
      'Authorization': `Bearer ${ghPat()}`,
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28',
      ...(opts.headers || {}),
    },
  });
  return res;
}

  document.getElementById('settingsPat').value  = ghPat();

}

let _bulkSetCounters = {};

function addBulkSet(exIdx, weight = '', reps = '') {
  if (!_bulkSetCounters[exIdx]) _bulkSetCounters[exIdx] = 0;
  _bulkSetCounters[exIdx]++;
  const sid  = _bulkSetCounters[exIdx];
  const list = document.getElementById(`bulk_sets_${exIdx}`);
  if (!list) return;
  const num  = list.children.length + 1;
  const div  = document.createElement('div');
  div.className = 'set-row';
  div.dataset.setid = sid;
  div.innerHTML = `
    <div class="set-num">${num}</div>
    <input class="set-input" id="bsw_${exIdx}_${sid}" type="number" step="0.5" min="0" placeholder="kg" value="${weight}">
    <input class="set-input" id="bsr_${exIdx}_${sid}" type="number" min="0" placeholder="reps" value="${reps}">
    <button class="set-remove" onclick="removeBulkSet(this,${exIdx})">✕</button>
  `;
  list.appendChild(div);
  renumberBulkSets(exIdx);
}

function removeBulkSet(btn, exIdx) {
  btn.closest('.set-row').remove();
  renumberBulkSets(exIdx);
}

function renumberBulkSets(exIdx) {
  document.querySelectorAll(`#bulk_sets_${exIdx} .set-row`).forEach((row, i) => {
    row.querySelector('.set-num').textContent = i + 1;

}

  }

  body += `<div class="form-group">
    <label class="form-label">Notes / How it felt</label>
    <textarea class="form-textarea" id="log_notes" placeholder="Anything notable…"></textarea>
  </div>`;

  document.getElementById('logModalBody').innerHTML = body;
  document.getElementById('logModal').classList.add('open');
}

function closeLogModal() { document.getElementById('logModal').classList.remove('open'); }

async function submitLog() {
  const btn = document.getElementById('logSubmitBtn');
  const msg = document.getElementById('logMsg');
  btn.disabled = true;
  msg.textContent = 'Saving…';
  msg.style.color = 'var(--text-dim)';

  const day     = _logDay;
  const info    = WEEK_PLAN[day];
  const session = SESSIONS[info.session];
  const profile = PROFILES[currentPerson];
  const dateStr = dayPillDate(currentWeek, DAYS_LIST.indexOf(day));
  const wk      = WEEKS[currentWeek - 1];

  // Build issue body
  let issueBody = `## Workout Log\n\n`;
  issueBody += `| | |\n|---|---|\n`;
  issueBody += `| **Person** | ${profile.name} |\n`;
  issueBody += `| **Date** | ${dateStr} |\n`;
  issueBody += `| **Week** | ${currentWeek} of 16 (${wk.focus}) |\n`;
  issueBody += `| **Session** | ${session.title} |\n\n`;

  const notes = document.getElementById('log_notes')?.value?.trim();

  if (session.tag === 'strength') {
    const allEx  = getAllExercises(session);
    const rpe    = document.getElementById('log_rpe')?.value?.trim();
    const notes  = document.getElementById('log_notes')?.value?.trim();
    const created = [], failed = [];
    for (let i = 0; i < allEx.length; i++) {
      const ex = allEx[i];
      const setRows = document.querySelectorAll(`#bulk_sets_${i} .set-row`);
      const sets = [];
      setRows.forEach((row, si) => {
        const sid = row.dataset.setid;
        const w = document.getElementById(`bsw_${i}_${sid}`)?.value?.trim() || '';
        const r = document.getElementById(`bsr_${i}_${sid}`)?.value?.trim() || '';
        if (w || r) sets.push({ num: si + 1, weight: w || '—', reps: r || '—' });
      });
      if (!sets.length) continue;
      msg.textContent = `Saving ${ex.name}… (${i + 1}/${allEx.length})`;
      let exBody = `## Exercise Log: ${ex.name}\n\n| | |\n|---|---|\n`;
      exBody += `| **Person** | ${profile.name} |\n| **Date** | ${dateStr} |\n`;
      exBody += `| **Week** | ${wk.w} of 16 (${wk.focus}) |\n| **Session** | ${session.title} |\n`;
      exBody += `| **Planned** | ${ex.sets}${ex.rpe !== '—' ? ` · RPE ${ex.rpe}` : ''} |\n`;
      if (rpe) exBody += `| **Overall RPE** | ${rpe}/10 |\n`;
      exBody += `\n## Sets\n\n| Set | Weight (kg) | Reps |\n|---|---|---|\n`;
      sets.forEach(s => { exBody += `| ${s.num} | ${s.weight} | ${s.reps} |\n`; });
      if (notes) exBody += `\n## Notes\n\n${notes}\n`;
      const exTitle = `[${dateStr}] ${profile.name} — ${ex.name} (Week ${wk.w})`;
      const labels = ['exercise-log', currentPerson, exSlug(ex.name), `day-${day.toLowerCase()}`, `week-${wk.w}`];
      try {
        const r = await ghFetch(`/repos/${ghRepo()}/issues`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: exTitle, body: exBody, labels }),
        });
        if (r.ok) { const d = await r.json(); created.push({ name: ex.name, url: d.html_url, num: d.number }); }
        else failed.push(ex.name);
      } catch { failed.push(ex.name); }
    }
    localStorage.setItem(loggedKey(day, currentWeek), 'bulk');
    msg.style.color = failed.length ? 'var(--accent2)' : 'var(--accent3)';
    if (created.length) {
      msg.innerHTML = `✓ ${created.length} exercise${created.length > 1 ? 's' : ''} logged: ` +
        created.map(c => `<a href="${c.url}" target="_blank" style="color:var(--accent)">#${c.num} ${c.name}</a>`).join(', ') +
        (failed.length ? `<br>✗ Failed: ${failed.join(', ')}` : '');
    } else {
      msg.style.color = 'var(--text-dim)';
      msg.textContent = 'No sets entered — nothing saved.';
    }
    btn.textContent = '✓ Done';
    renderWorkout();
    return;
  }

  else if (session.tag === 'run') {
    const dist = document.getElementById('log_dist')?.value;
    const time = document.getElementById('log_time')?.value;
    const hr   = document.getElementById('log_hr')?.value;
    const cad  = document.getElementById('log_cad')?.value;
    const rpe  = document.getElementById('log_rpe')?.value;
    const planned = day === 'Wed' ? wk[currentPerson].easy : wk[currentPerson].long;
    issueBody += `### Run Stats\n\n| Metric | Value |\n|---|---|\n`;
    issueBody += `| Planned distance | ${planned} |\n`;
    if (dist) issueBody += `| Actual distance | ${dist} km |\n`;
    if (time) issueBody += `| Time | ${time} |\n`;
    if (dist && time) {
      // calc pace mm:ss/km
      const parts = time.split(':');
      const totalSec = parts.length === 2 ? parseInt(parts[0])*60+parseInt(parts[1]) : parseInt(parts[0])*3600+parseInt(parts[1])*60+parseInt(parts[2]);
      const paceSec  = totalSec / parseFloat(dist);
      const pm = Math.floor(paceSec/60), ps = Math.round(paceSec%60);
      issueBody += `| Avg pace | ${pm}:${ps.toString().padStart(2,'0')} /km |\n`;
    }
    if (hr)  issueBody += `| Avg HR | ${hr} bpm |\n`;
    if (cad) issueBody += `| Avg cadence | ${cad} spm |\n`;
    if (rpe) issueBody += `| RPE | ${rpe}/10 |\n`;
  }

  else { // recovery
    const checked = session.activities.map((a, i) =>
      document.getElementById(`log_act${i}`)?.checked ? `✓ ${a}` : `✗ ${a}`
    );
    issueBody += `### Activities\n\n${checked.map(c => `- ${c}`).join('\n')}\n`;
  }

  if (notes) issueBody += `\n### Notes\n\n${notes}\n`;

  const issueTitle = `[${dateStr}] ${profile.name} — ${session.title} (Week ${currentWeek})`;

  try {
    const res = await ghFetch(`/repos/${ghRepo()}/issues`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        title: issueTitle,
        body: issueBody,
        labels: ['workout-log', session.tag, `week-${currentWeek}`, currentPerson],
      }),
    });

    if (res.ok) {
      const data = await res.json();
      // Mark locally
      localStorage.setItem(loggedKey(day, currentWeek), data.html_url);
      msg.style.color = 'var(--accent3)';
      msg.textContent = `✓ Logged! View on GitHub →`;
      msg.innerHTML += ` <a href="${data.html_url}" target="_blank" style="color:var(--accent)">Issue #${data.number}</a>`;
      btn.textContent = '✓ Done';
      renderWorkout(); // refresh to show "Logged" badge
    } else {
      const err = await res.json();
      msg.style.color = 'var(--accent2)';
      msg.textContent = `✗ ${err.message || res.statusText}`;
      btn.disabled = false;
    }
  } catch(e) {
    msg.style.color = 'var(--accent2)';
    msg.textContent = '✗ Network error';
    btn.disabled = false;
  }
}

// ─── HISTORY ─────────────────────────────────────────────────────────────────
async function openHistory(day) {
  const info    = WEEK_PLAN[day];
  const session = SESSIONS[info.session];
  document.getElementById('historyModalSub').textContent =
    `${info.icon} ${session.title} — all logged entries`;
  document.getElementById('historyBody').innerHTML =
    `<div style="color:var(--text-dim);font-size:0.85rem">Loading…</div>`;
  document.getElementById('historyModal').classList.add('open');

  if (!ghPat()) {
    document.getElementById('historyBody').innerHTML =
      `<div style="color:var(--accent2);font-size:0.84rem">Set up GitHub in ⚙️ Settings first.</div>`;
    return;
  }

  try {
    const label = encodeURIComponent(session.tag);
    const person = encodeURIComponent(currentPerson);
    const res = await ghFetch(
      `/repos/${ghRepo()}/issues?labels=workout-log,${label},${person}&state=open&per_page=30`
    );
    if (!res.ok) throw new Error(res.statusText);
    const issues = await res.json();

    // filter by session title in issue title
    const filtered = issues.filter(i => i.title.includes(session.title));

    if (!filtered.length) {
      document.getElementById('historyBody').innerHTML =
        `<div style="color:var(--text-dim);font-size:0.84rem">No logs yet for ${session.title}.</div>`;
      return;
    }

    document.getElementById('historyBody').innerHTML = filtered.map(issue => `
      <div class="history-entry">
        <div class="history-date">${new Date(issue.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</div>
        <div class="history-title">${issue.title}</div>
        <div class="history-body">${mdTableToText(issue.body)}</div>
        <a class="history-link" href="${issue.html_url}" target="_blank">View full log on GitHub →</a>
      </div>
    `).join('');
  } catch(e) {
    document.getElementById('historyBody').innerHTML =
      `<div style="color:var(--accent2);font-size:0.84rem">Error: ${e.message}</div>`;
  }
}

function closeHistory() { document.getElementById('historyModal').classList.remove('open'); }

// Strip markdown tables for compact display
function mdTableToText(md) {
  if (!md) return '';
  return md
    .replace(/\|[-: ]+\|[-: |]+\n/g, '')   // separator rows
    .replace(/\|/g, '')                      // pipes
    .replace(/\*\*/g, '')                    // bold markers
    .replace(/^#{1,3}\s+/gm, '')            // headings
    .split('\n').filter(l => l.trim()).slice(0, 20).join('\n')
    .trim();
}
