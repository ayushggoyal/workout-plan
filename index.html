<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Plan</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --accent: #6c8fff;
    --accent2: #ff6b6b;
    --accent3: #52d9a0;
    --text: #e8eaf6;
    --text-dim: #8b91b5;
    --border: #2d3152;
    --radius: 12px;
    --person-color: #6c8fff;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 20px;
    max-width: 860px;
    margin: 0 auto;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 20px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .header-left h1 { font-size: 1.4rem; font-weight: 700; }
  .date-str { color: var(--text-dim); font-size: 0.82rem; margin-top: 2px; }

  .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  /* ── Person toggle ── */
  .person-toggle {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .person-btn {
    padding: 8px 18px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--text-dim);
    transition: all 0.15s;
  }
  .person-btn.active-ayush  { background: #1e2a5e; color: #6c8fff; }
  .person-btn.active-ayushi { background: #2a1a3e; color: #c084fc; }

  /* ── Week control ── */
  .week-control {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 14px;
  }
  .week-control label { font-size: 0.78rem; color: var(--text-dim); }
  .week-control input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 4px 8px;
    width: 48px;
    font-size: 0.9rem;
    text-align: center;
  }
  .week-nav { display: flex; gap: 6px; }
  .week-nav button {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px;
    padding: 4px 10px; cursor: pointer; font-size: 0.85rem;
  }
  .week-nav button:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Day strip ── */
  .day-strip {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }
  .day-pill {
    background: var(--surface);
    border: 2px solid transparent;
    border-radius: var(--radius);
    padding: 10px 4px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
  }
  .day-pill:hover { border-color: var(--border); }
  .day-pill.active { border-color: var(--person-color); background: var(--surface2); }
  .day-pill.today { box-shadow: 0 0 0 1px var(--accent3) inset; }
  .day-pill .dp-icon { font-size: 1.1rem; }
  .day-pill .dp-name { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-top: 4px; }
  .day-pill .dp-type { font-size: 0.68rem; font-weight: 600; margin-top: 3px; line-height: 1.2; color: var(--text-dim); }
  .day-pill.active .dp-type { color: var(--text); }

  /* ── Tags ── */
  .tag {
    display: inline-block; font-size: 0.68rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.07em;
    padding: 2px 9px; border-radius: 20px; margin-bottom: 12px;
  }
  .tag-strength { background: #1e2a5e; color: var(--accent); }
  .tag-run      { background: #1e3d2e; color: var(--accent3); }
  .tag-recovery { background: #2a1e1e; color: var(--accent2); }

  /* ── Workout card ── */
  .workout-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 14px;
  }
  .workout-title   { font-size: 1.25rem; font-weight: 700; margin-bottom: 4px; }
  .workout-subtitle{ color: var(--text-dim); font-size: 0.83rem; margin-bottom: 16px; }

  /* ── Person callout ── */
  .person-callout {
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 0.83rem;
    line-height: 1.6;
    margin-bottom: 14px;
    border-left: 3px solid;
  }
  .callout-ayush  { background: #131b3a; border-color: #6c8fff; }
  .callout-ayushi { background: #1e1330; border-color: #c084fc; }
  .callout-title  { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .callout-ayush  .callout-title { color: #6c8fff; }
  .callout-ayushi .callout-title { color: #c084fc; }

  /* ── Exercise table ── */
  .exercise-table { width: 100%; border-collapse: collapse; font-size: 0.84rem; margin-bottom: 14px; }
  .exercise-table th {
    background: var(--surface2); color: var(--text-dim);
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em;
    padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border);
  }
  .exercise-table td { padding: 10px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .exercise-table tr:last-child td { border-bottom: none; }
  .exercise-table tr:hover td { background: var(--surface2); }
  .exercise-name { font-weight: 600; }

  .badge {
    display: inline-block; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 4px; padding: 1px 7px; font-size: 0.78rem; font-weight: 600;
    color: var(--accent); white-space: nowrap;
  }
  .badge-rest   { color: var(--accent2); }
  .badge-rpe    { color: var(--accent3); }
  .badge-mod    { color: #ffd166; }

  /* ── Run stats ── */
  .run-stats {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap: 10px; margin-bottom: 16px;
  }
  .stat-box {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 12px; text-align: center;
  }
  .stat-label { font-size: 0.68rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; }
  .stat-value { font-size: 1.4rem; font-weight: 700; margin-top: 4px; }
  .stat-unit  { font-size: 0.72rem; color: var(--text-dim); margin-top: 2px; }

  /* ── Collapsible ── */
  .section { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
  .section-header { padding: 12px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 0.84rem; font-weight: 600; }
  .section-header:hover { background: rgba(255,255,255,0.03); }
  .section-chevron { color: var(--text-dim); transition: transform 0.2s; font-size: 0.75rem; }
  .section-chevron.open { transform: rotate(180deg); }
  .section-body { padding: 0 16px 14px; font-size: 0.82rem; color: var(--text-dim); line-height: 1.65; display: none; }
  .section-body.open { display: block; }
  .bullet-list { padding-left: 16px; }
  .bullet-list li { margin-bottom: 4px; }

  /* ── Focus banner ── */
  .focus-banner {
    background: var(--surface2); border: 1px solid var(--border);
    border-left: 3px solid var(--accent3); border-radius: 0 10px 10px 0;
    padding: 10px 14px; font-size: 0.81rem; color: var(--text-dim); margin-bottom: 14px;
  }
  .focus-banner strong { color: var(--text); }

  /* ── Profile card ── */
  .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .profile-box {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px;
  }
  .profile-box.highlighted { border-color: var(--person-color); }
  .profile-box-name { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
  .profile-row { display: flex; justify-content: space-between; font-size: 0.8rem; padding: 3px 0; border-bottom: 1px solid var(--border); }
  .profile-row:last-child { border-bottom: none; }
  .profile-key { color: var(--text-dim); }
  .profile-val { font-weight: 600; text-align: right; }

  @media (max-width: 600px) {
    .day-strip { gap: 4px; }
    .day-pill  { padding: 8px 2px; }
    .day-pill .dp-type { display: none; }
    .profile-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

    cooldown:['5–10 min easy walk','Full stretch: quads, hamstrings, hip flexors, calves, glutes','Foam roll if available','Rehydrate + eat carbs + protein within 60 min'],
    checklist:['Warm up using standard protocol (10–12 min)','Run at conversational effort throughout','Fuel if run exceeds 90 minutes','Cool down: walk + full stretch','Log HR, cadence, RPE, recovery rating'],
    personKey:'longRunNote',
    personExtra:{
      ayush:  ['Knee watch: any pain >3/10 → stop and assess. Do not push through.','Smooth, even pacing. No surges. Protect the knee for the marathon build.','After October: long run distances shift to marathon prep (22→32 km).'],
      ayushi: ['Focus on uninterrupted time on feet — pace is secondary.','Run/walk is absolutely fine. Consistency > speed every time.','Goal for Oct: finish confidently and enjoy it.'],
    },
  },
  'recovery': {
    title:'Recovery + Mobility', tag:'recovery',
    subtitle:'Active recovery. Promote circulation, reduce soreness, reset for next week.',
    activities:[
      '20–30 min easy walk (light jog only if genuinely feeling great)',
      'Desk-worker mobility: 10 min — hip flexors, thoracic rotation, neck',
      'Foam roll: calves, quads, hamstrings, glutes – 8–10 min',
      'Post-workout stretching: all major muscle groups',
      'Foot & ankle routine (both)',
    ],
    metrics:['Log resting HR on Apple Watch','Log HRV','Note knee / foot status (0–10)','Note sleep hours and quality','Body weight (optional)'],
    sleep:['Sleep 7.5–9 hours.','Review the past week: long run done? Gym sessions? How are you feeling?','Sunday is also a good time to confirm next week\'s schedule.'],
    personExtra:{
      ayush:  ['Do the knee prehab routine (twice weekly — fits well on Sun + Wed).','Check toe blister status — update sock/shoe setup if needed.','If resting HR is up >5 bpm or HRV is down → reduce Tuesday intensity.'],
      ayushi: ['Focus on consistency review: were all workouts done this week?','Don\'t compare pace with others. Your progress is your own benchmark.'],
    },
  },
};

// ─── STATE ───────────────────────────────────────────────────────────────────
// Plan starts Monday 29 June 2026
const PLAN_START = new Date('2026-06-29T00:00:00');

let currentPerson = localStorage.getItem('workout_person') || 'ayush';
let currentWeek   = null; // computed from date
let selectedDay   = null; // 0=Mon … 6=Sun

function todayDayIdx() {
  const js = new Date().getDay(); // 0=Sun
  return js === 0 ? 6 : js - 1;
}

// Returns { week: 1-16, dayIdx: 0-6 } for a given Date, or null if before plan start
function planPositionFor(date) {
  const msPerDay  = 86400000;
  const startNoon = new Date(PLAN_START); startNoon.setHours(0,0,0,0);
  const d = new Date(date); d.setHours(0,0,0,0);
  const diff = Math.floor((d - startNoon) / msPerDay);
  if (diff < 0) return null; // before plan
  const weekIdx = Math.min(Math.floor(diff / 7), 15); // clamp to week 16
  const dayIdx  = diff % 7; // 0=Mon … 6=Sun
  return { week: weekIdx + 1, dayIdx };
}

// Returns the Monday Date of a given plan week (1-indexed)
function weekStartDate(w) {
  const d = new Date(PLAN_START);
  d.setDate(d.getDate() + (w - 1) * 7);
  return d;
}

// Date string for day pill: "29 Jun"
function dayPillDate(weekNum, dayIdx) {
  const d = new Date(weekStartDate(weekNum));
  d.setDate(d.getDate() + dayIdx);
  return d.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
}

function init() {
  const pos = planPositionFor(new Date());
  if (pos) {
    currentWeek = pos.week;
    selectedDay = pos.dayIdx;
  } else {
    currentWeek = 1;
    selectedDay = 0; // Mon — plan hasn't started yet
  }
  document.getElementById('weekInput').value = currentWeek;
  applyPersonColor();
  updateDateStr();
  renderDayStrip();
  renderWorkout();
}

function updateDateStr() {
  document.getElementById('dateStr').textContent =
    new Date().toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}

function setPerson(p) {
  currentPerson = p;
  localStorage.setItem('workout_person', p);
  applyPersonColor();
  document.getElementById('btnAyush') .className = 'person-btn' + (p === 'ayush'  ? ' active-ayush'  : '');
  document.getElementById('btnAyushi').className = 'person-btn' + (p === 'ayushi' ? ' active-ayushi' : '');
  renderDayStrip();
  renderWorkout();
}

function applyPersonColor() {
  document.documentElement.style.setProperty('--person-color', PROFILES[currentPerson].color);
}

function setWeek(v) {
  currentWeek = Math.max(1, Math.min(16, parseInt(v) || 1));
  document.getElementById('weekInput').value = currentWeek;
  renderDayStrip();
  renderWorkout();
}
function changeWeek(d) { setWeek(currentWeek + d); }

// ─── DAY STRIP ───────────────────────────────────────────────────────────────
function renderDayStrip() {
  const todayPos = planPositionFor(new Date());
  const wk = WEEKS[currentWeek - 1];
  const p  = currentPerson;
  const strip = document.getElementById('dayStrip');
  strip.innerHTML = DAYS_LIST.map((day, i) => {
    const info = WEEK_PLAN[day];
    let sublabel = info.label;
    if (day === 'Wed' && wk) sublabel = `Easy ${wk[p].easy}`;
    if (day === 'Sat' && wk) sublabel = `Long ${wk[p].long.replace(' (RACE 🏁)','')}`;

    const dateStr = dayPillDate(currentWeek, i);
    const isToday = todayPos && todayPos.week === currentWeek && todayPos.dayIdx === i;

    let cls = 'day-pill';
    if (i === selectedDay) cls += ' active';
    if (isToday)           cls += ' today';

    return `<div class="${cls}" onclick="selectDay(${i})">
      <div class="dp-icon">${info.icon}</div>
      <div class="dp-name">${day} <span style="font-size:0.58rem;color:var(--text-dim)">${dateStr}</span></div>
      <div class="dp-type">${sublabel}</div>
    </div>`;
  }).join('');
}

function selectDay(i) { selectedDay = i; renderDayStrip(); renderWorkout(); }

// ─── WORKOUT RENDER ──────────────────────────────────────────────────────────
function renderWorkout() {
  const day     = DAYS_LIST[selectedDay];
  const info    = WEEK_PLAN[day];
  const wk      = WEEKS[currentWeek - 1];
  const session = SESSIONS[info.session];
  const profile = PROFILES[currentPerson];
  document.getElementById('workoutContent').innerHTML = buildHTML(day, info, session, wk, profile);
}

function buildHTML(day, info, session, wk, profile) {
  let h = '';

  // Focus banner
  const focusCol = { Deload:'var(--accent2)', Recovery:'var(--accent2)', 'Race Week':'#ffd166', 'Post-Race':'#ffd166' }[wk.focus] || 'var(--accent3)';
  const pData = wk[currentPerson];
  const wkStart = weekStartDate(currentWeek);
  const wkEnd   = new Date(wkStart); wkEnd.setDate(wkEnd.getDate() + 6);
  const fmt = d => d.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
  h += `<div class="focus-banner">
    Week ${wk.w} of 16 — <strong style="color:${focusCol}">${wk.focus}</strong>
    &nbsp;·&nbsp; <span style="color:var(--text-dim)">${fmt(wkStart)} – ${fmt(wkEnd)}</span>
    &nbsp;·&nbsp; Wed easy: <strong>${pData.easy}</strong>
    &nbsp;·&nbsp; Sat long: <strong>${pData.long}</strong>
  </div>`;

  h += `<div class="workout-card">`;

  const tagLabel = { strength:'Strength', run:'Running', recovery:'Recovery' }[session.tag];
  h += `<div class="tag tag-${session.tag}">${tagLabel}</div>`;
  h += `<div class="workout-title">${info.icon} ${session.title}</div>`;
  h += `<div class="workout-subtitle">${session.subtitle}</div>`;

  // ── Person callout ──
  const personNote = profile[session.personKey];
  const personExtra = session.personExtra?.[currentPerson] || [];
  const allNotes = [personNote, ...personExtra].filter(Boolean);

  if (allNotes.length) {
    h += `<div class="person-callout callout-${currentPerson}">
      <div class="callout-title">📍 ${profile.name}'s Notes</div>
      <ul class="bullet-list">${allNotes.map(n=>`<li>${n}</li>`).join('')}</ul>
    </div>`;
  }

  // ── RUN ──
  if (session.tag === 'run') {
    const dist = day === 'Wed' ? pData.easy : pData.long;
    const isRace = dist.includes('RACE');

    h += `<div class="run-stats">
      <div class="stat-box">
        <div class="stat-label">Distance</div>
        <div class="stat-value" style="color:var(--accent3)">${dist.replace(' (RACE 🏁)','')}</div>
        ${isRace ? '<div class="stat-unit" style="color:#ffd166">🏁 RACE DAY</div>' : ''}
      </div>
      <div class="stat-box">
        <div class="stat-label">Effort</div>
        <div class="stat-value" style="font-size:1rem;color:var(--accent3);margin-top:6px">${session.effort}</div>
        <div class="stat-unit">${session.zone}</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Cadence Target</div>
        <div class="stat-value" style="font-size:0.95rem;color:var(--accent);margin-top:6px">${profile.cadenceTarget.split(' ')[0]}</div>
        <div class="stat-unit">${currentPerson === 'ayush' ? 'spm target (now 161)' : 'natural — no forcing'}</div>
      </div>
    </div>`;

    h += collapsible('🚶 Warm-up', session.warmup, true);
    h += collapsible('🎯 Running Cues', session.cues);
    h += collapsible('🧊 Cool-down', session.cooldown);
    if (session.checklist) h += collapsible('✅ Checklist', session.checklist);
  }

  // ── STRENGTH ──
  else if (session.tag === 'strength') {
    // Ayushi modifier note
    if (currentPerson === 'ayushi') {
      h += `<div style="font-size:0.78rem;color:#c084fc;background:#1e1330;border-radius:8px;padding:8px 12px;margin-bottom:12px">
        ℹ️ Same exercises as Ayush — adjust weight so 2–3 reps remain in reserve on every set.
      </div>`;
    }

    h += collapsible('🔥 Warm-up', session.warmup, true);

    h += `<table class="exercise-table"><thead><tr>
      <th>Exercise</th><th>Sets × Reps</th><th>RPE</th><th>Rest</th><th>Tempo</th>
    </tr></thead><tbody>`;
    session.exercises.forEach(ex => {
      h += `<tr>
        <td><span class="exercise-name">${ex.name}</span></td>
        <td><span class="badge">${ex.sets}</span></td>
        <td><span class="badge badge-rpe">${ex.rpe}</span></td>
        <td><span class="badge badge-rest">${ex.rest}</span></td>
        <td style="color:var(--text-dim);font-size:0.79rem">${ex.tempo}</td>
      </tr>`;
    });
    h += `</tbody></table>`;

    if (session.core) {
      h += `<h3 style="font-size:0.88rem;color:var(--text-dim);margin-bottom:8px">Core Finisher</h3>`;
      if (currentPerson === 'ayushi') {
        h += `<div style="font-size:0.76rem;color:#c084fc;margin-bottom:8px">Begin with 1 round of each. Build to full volume over weeks.</div>`;
      }
      h += `<table class="exercise-table"><thead><tr>
        <th>Exercise</th><th>Sets</th><th>Rest</th><th>Purpose</th>
      </tr></thead><tbody>`;
      session.core.forEach(ex => {
        h += `<tr>
          <td><span class="exercise-name">${ex.name}</span></td>
          <td><span class="badge">${ex.sets}</span></td>
          <td><span class="badge badge-rest">${ex.rest}</span></td>
          <td style="color:var(--text-dim);font-size:0.79rem">${ex.note}</td>
        </tr>`;
      });
      h += `</tbody></table>`;
    }

    h += collapsible('🧊 Post-workout Stretch', session.stretch);
  }

  // ── RECOVERY ──
  else {
    h += `<ul class="bullet-list" style="font-size:0.86rem;line-height:1.9;margin-bottom:14px">`;
    session.activities.forEach(a => { h += `<li>${a}</li>`; });
    h += `</ul>`;

    // Profile snapshot on recovery day
    h += `<div class="profile-grid">
      ${buildProfileBox('ayush',  currentPerson === 'ayush')}
      ${buildProfileBox('ayushi', currentPerson === 'ayushi')}
    </div>`;

    h += collapsible('📱 Metrics to Log', session.metrics);
    h += collapsible('😴 Weekly Review', session.sleep);
  }

  h += `</div>`; // workout-card
  return h;
}

function buildProfileBox(p, highlighted) {
  const pr = PROFILES[p];
  const rows = [
    ['Goal', pr.goal],
    ['VO₂ Max', `~${pr.vo2}`],
    ...(pr.rhr ? [['Resting HR', pr.rhr]] : []),
    ['Cadence', pr.cadence],
    ['Cadence Target', pr.cadenceTarget],
    ['Hydration', pr.hydration],
    ['Protein', pr.protein],
    ['Injury Focus', pr.injuryFocus],
    ['Post Half-Marathon', pr.postHalf],
  ];
  const color = pr.color;
  return `<div class="profile-box ${highlighted ? 'highlighted' : ''}">
    <div class="profile-box-name" style="color:${color}">${pr.name}</div>
    ${rows.map(([k,v]) => `<div class="profile-row"><span class="profile-key">${k}</span><span class="profile-val" style="max-width:55%;font-size:0.76rem">${v}</span></div>`).join('')}
  </div>`;
}

function collapsible(title, items, open = false) {
  const id = 'sec_' + Math.random().toString(36).slice(2,8);
  return `<div class="section">
    <div class="section-header" onclick="tog('${id}')">
      <span>${title}</span>
      <span class="section-chevron ${open ? 'open' : ''}" id="chev_${id}">▼</span>
    </div>
    <div class="section-body ${open ? 'open' : ''}" id="${id}">
      <ul class="bullet-list">${items.map(i=>`<li>${i}</li>`).join('')}</ul>
    </div>
  </div>`;
}

function tog(id) {
  document.getElementById(id).classList.toggle('open');
  document.getElementById('chev_'+id).classList.toggle('open');
}

init();
</script>
</body>
</html>
